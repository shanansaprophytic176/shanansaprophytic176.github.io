mainSections   = ["post"]
rssFullContent = true

[footer]
    since      = 2026
    customText = "Powered by Hugo & Theme Stack"

[sidebar]
    emoji    = " meteor"
    avatar   = ""

[article]
    math     = false
    toc      = true
    readingTime = true

    [article.list]
        showTags = false

    [article.license]
        enabled = false

[widgets]
    homepage = [
        { type = "search" },
        { type = "archives", params = { limit = 5 } },
        { type = "categories", params = { limit = 10 } },
        { type = "tag-cloud", params = { limit = 10 } },
    ]
    page = [{ type = "toc" }]

[colorScheme]
    toggle  = true
    default = "auto"

[comments]
    enabled = false
