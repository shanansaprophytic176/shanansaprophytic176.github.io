mainSections   = ["post"]
rssFullContent = true

favicon = "/favicon.svg"

[footer]
    since      = 2026
    customText = "Powered by Hugo & Theme Stack"

[sidebar]
    avatar   = "https://github.com/METEOR-ECHO.png"

[article]
    math     = false
    toc      = true
    readingTime = true

    [article.list]
        showTags = false

    [article.license]
        enabled = true
        default = "Licensed under CC BY-NC-SA 4.0"

[widgets]
    homepage = [
        { type = "search" },
        { type = "archives", params = { limit = 5 } },
        { type = "categories", params = { limit = 10 } },
        { type = "tag-cloud", params = { limit = 10 } },
    ]
    page = [{ type = "toc" }]

[colorScheme]
    toggle  = true
    default = "auto"

[comments]
    enabled = false

[seo]
    [seo.meta]
        description = "一个关于技术与生活的个人博客"
        keywords = ["技术博客", "隐私计算", "密码学", "Hugo", "嵌入式", "同态加密"]
